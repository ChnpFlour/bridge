<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeBelong Clinic - กำลังเข้าสู่ระบบนัดหมาย</title>
  <!-- โหลดสคริปต์ LINE SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const liffId = "2010473291-G9NyWQvv"; 
    
    // ⚠️ แอดมินนำลิงก์ Web App (URL ของ Google Apps Script ที่ลงท้ายด้วย /exec) มาวางตรงนี้ครับ!
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbwnNxdmIZve5CZolodWp29-gKeeNovAp-Ch664ciZ3AKjue6Fr758dr2RTXPLPmNCB5/exec"; 

    async function initializeBridge() {
      try {
        await liff.init({ liffId: liffId });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          const userId = profile.userId;
          // ดีดตัวกลับไปที่ฟอร์ม WeBelong พร้อมแนบค่า User ID ไปใน URL อย่างปลอดภัย
          window.location.href = gasWebUrl + "?uid=" + userId;
        }
      } catch (err) {
        console.error("Bridge Error:", err);
        // หากเกิดข้อผิดพลาด ให้ดีดตัวไปหน้าฟอร์มปกติเลย เพื่อให้ผู้ปกครองยังจองคิวได้อยู่
        window.location.href = gasWebUrl;
      }
    }
    window.onload = initializeBridge;
  </script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #FFECD5; margin: 0; }
    .loader-box { text-align: center; }
    .spinner { border: 4px solid rgba(0, 66, 170, 0.1); border-top: 4px solid #0042AA; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader-box">
    <div class="spinner"></div>
    <p style="color: #0042AA; font-weight: bold;">กำลังเข้าสู่ระบบนัดหมาย WeBelong...</p>
  </div>
</body>
</html>
