<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to WeBelong Clinic...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #FFECD5;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(0, 66, 170, 0.1);
      border-top: 4px solid #0042AA;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    p { margin-top: 15px; color: #0042AA; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>กำลังเชื่อมต่อข้อมูลระบบ WeBelong...</p>

  <script>
    const liffId = "2010473291-G9NyWQvv";
    // ⚠️ แอดมินแก้ไข: นำลิงก์ URL Web App (URL ยาวๆ ที่ลงท้ายด้วย /exec) ของตัวเองมาใส่ในช่องปีกกาคู่นี้ครับ
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbz1S0H0oE9U7g_VdE-S0-S7bN8b-UdfZ9sA/exec";

    async function initBridge() {
      try {
        await liff.init({ liffId: liffId });
        
        if (liff.isInClient()) {
          // หากรันในแอป LINE บนมือถือจริง ให้สแกนล็อกอินเงียบๆ และดึง UID ไปทำงานต่อ
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            const profile = await liff.getProfile();
            const userId = profile.userId;
            // พาส่งข้อมูลไปหน้าฟอร์มกรอกประวัติบน Google Sheets พร้อมแนบ User ID ไปด้วย
            window.location.replace(gasWebUrl + "?uid=" + encodeURIComponent(userId));
          }
        } else {
          // หากรันในคอมพิวเตอร์ทั่วไป ข้ามไปหน้ากรอกประวัติได้ทันทีโดยไม่บีบล็อกอิน
          window.location.replace(gasWebUrl + "?uid=PC");
        }
      } catch (err) {
        console.error("LIFF Bridge Connection Error:", err);
        // Fallback ส่งไปกรอกฟอร์มปกติเพื่อไม่ให้ระบบค้าง
        window.location.replace(gasWebUrl + "?uid=Error_" + encodeURIComponent(err.message));
      }
    }

    window.onload = function() {
      initBridge();
    };
  </script>
</body>
</html>
